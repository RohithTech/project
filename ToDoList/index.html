<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>To Do List</h1>
    <div class="container">

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter a task...">
            <button id="addBtn" onclick="functiontoadd()">Add✅</button>
        </div>
        <ol class="ordertos"></ol>

        <button id="checkstatus" onclick="finishedtasks()" type="button">Finished ❌Tasks</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
